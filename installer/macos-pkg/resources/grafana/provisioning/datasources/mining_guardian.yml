# ============================================================
# Mining Guardian — Grafana datasource provisioning
# BiXBiT USA  •  W25 dashboard restore 2026-05-13, W26a 2026-05-13
#
# Four datasources matching the UIDs that all dashboards reference:
#
#   1. mg_operational_pg     — operational Postgres (port 5432)
#                              tables: scans, miner_readings, chain_readings,
#                              pool_readings, action_audit_log, etc.
#
#   2. mg_catalog_pg         — catalog Postgres, legacy UID kept so any
#                              older dashboards still resolve. Port 5433.
#                              Schemas: hardware.*, firmware.*, ops.*,
#                              knowledge.*, pool.*, market.*, facility.*,
#                              regulatory.*, repair.*, staging.*.
#
#   3. efi3m84mbf668b        — Prometheus, scrapes dashboard_api /metrics
#                              every 30s. Default datasource for new panels.
#
#   4. ffj6dpxcsts74d        — catalog Postgres, VPS UID kept so the
#                              restored VPS dashboards still resolve. Points
#                              at the same catalog DB as #2.
#
# W14a (2026-05-12) — user changed from guardian_app to mg to match the
# Postgres role the rest of the system uses. Operational+catalog DBs only
# have the mg role; guardian_app does not exist.
#
# W26a (2026-05-13) — `database` key duplicated inside jsonData. Grafana
# 12.2+ has a bug where the top-level `database` field alone produces
# the "no default database configured" error at panel-load time
# (see grafana/grafana#112418). Putting `database` inside jsonData too
# works around the bug. Belt-and-suspenders: both forms are kept.
#
# Password is read from the env var GUARDIAN_PG_PASSWORD which setup.sh
# Phase 11 exports from .env. NEVER hardcode credentials here — leaks
# happen, and a versioned secret cannot be rotated without rewriting git
# history.
#
# Idempotency: `editable: false` blocks GUI edits — the file is the source
# of truth. Re-running setup.sh / restore_from_snapshot.sh re-applies cleanly.
# ============================================================
apiVersion: 1

datasources:
  # ── 1. Operational Postgres (port 5432) ─────────────────────────────
  - name: Mining Guardian (operational)
    uid: mg_operational_pg
    type: postgres
    access: proxy
    url: 127.0.0.1:5432
    database: mining_guardian
    user: mg
    secureJsonData:
      password: "${GUARDIAN_PG_PASSWORD}"
    jsonData:
      database: mining_guardian
      sslmode: disable
      postgresVersion: 1600
      timescaledb: false
      maxOpenConns: 5
      maxIdleConns: 2
      connMaxLifetime: 14400
    isDefault: false
    editable: false

  # ── 2. Catalog Postgres — legacy UID (port 5433) ────────────────────
  - name: Mining Guardian Catalog (legacy uid)
    uid: mg_catalog_pg
    type: postgres
    access: proxy
    url: 127.0.0.1:5433
    database: mining_guardian_catalog
    user: mg
    secureJsonData:
      password: "${GUARDIAN_PG_PASSWORD}"
    jsonData:
      database: mining_guardian_catalog
      sslmode: disable
      postgresVersion: 1600
      timescaledb: false
    editable: false

  # ── 3. Prometheus (default) ─────────────────────────────────────────
  - name: Prometheus (Mining Guardian)
    uid: efi3m84mbf668b
    type: prometheus
    access: proxy
    url: http://127.0.0.1:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: 30s
      httpMethod: POST

  # ── 4. Catalog Postgres — VPS UID (port 5433) ───────────────────────
  - name: Mining Guardian Catalog (vps uid)
    uid: ffj6dpxcsts74d
    type: postgres
    access: proxy
    url: 127.0.0.1:5433
    database: mining_guardian_catalog
    user: mg
    secureJsonData:
      password: "${GUARDIAN_PG_PASSWORD}"
    jsonData:
      database: mining_guardian_catalog
      sslmode: disable
      postgresVersion: 1600
      timescaledb: false
    editable: false
