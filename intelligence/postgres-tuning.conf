# ============================================================================
# postgres-tuning.conf
# ============================================================================
# PostgreSQL 16 tuning for the Miner Intelligence Catalog.
# Host: ROBS-PC — AMD Ryzen 7 7800X3D (8c/16t, 96 MB L3 V-Cache), 32 GB RAM
#
# Tuned for a database that will grow to 50-100 GB of mixed structured data,
# JSONB documents, and full-text-indexed text. Workload is read-heavy with
# bursty bulk inserts during ingestion runs.
#
# RE-TUNE WHEN RAM IS UPGRADED:
#   - 32 GB host  -> shared_buffers=8GB,  effective_cache_size=24GB,  work_mem=64MB
#   - 64 GB host  -> shared_buffers=16GB, effective_cache_size=48GB,  work_mem=128MB
#   - 128 GB host -> shared_buffers=32GB, effective_cache_size=96GB,  work_mem=256MB
# Then restart the container with: docker compose restart miner-intel-db
# ============================================================================

# ── Connection settings ─────────────────────────────────────────────────────
listen_addresses = '*'                    # Container binds to its own 0.0.0.0
port = 5432
max_connections = 100                     # Plenty for 1-2 humans + Guardian VPS
shared_preload_libraries = 'pg_stat_statements'

# ── Memory (TUNED FOR 32 GB HOST RAM) ───────────────────────────────────────
shared_buffers = 8GB                      # 25% of host RAM
effective_cache_size = 24GB               # 75% of host RAM (a hint, not allocation)
work_mem = 64MB                           # Per query operation, not per connection
maintenance_work_mem = 2GB                # For VACUUM, CREATE INDEX, ALTER TABLE
huge_pages = try                          # Use huge pages if Linux kernel allows

# ── Write-ahead log + checkpoints ───────────────────────────────────────────
wal_level = replica                       # Enables future replication if needed
wal_compression = lz4                     # Reduce WAL volume on bulk ingest
max_wal_size = 4GB                        # Larger = fewer checkpoints during bulk insert
min_wal_size = 1GB
checkpoint_completion_target = 0.9        # Spread checkpoint I/O over 90% of interval
checkpoint_timeout = 15min

# ── Query planner ───────────────────────────────────────────────────────────
random_page_cost = 1.1                    # SSD storage, not spinning disk
effective_io_concurrency = 200            # NVMe/SSD can do many concurrent reads
default_statistics_target = 100           # More accurate query plans

# ── Parallelism (Ryzen 7 7800X3D has 8 cores / 16 threads) ──────────────────
max_worker_processes = 16
max_parallel_workers_per_gather = 4
max_parallel_workers = 16
max_parallel_maintenance_workers = 4      # For parallel index builds

# ── Logging ─────────────────────────────────────────────────────────────────
logging_collector = on
log_directory = '/var/lib/postgresql/data/log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_rotation_age = 1d
log_rotation_size = 100MB
log_min_duration_statement = 1000         # Log queries slower than 1 second
log_checkpoints = on
log_connections = off                     # Too noisy for normal ops
log_disconnections = off
log_lock_waits = on
log_temp_files = 10MB
log_line_prefix = '%t [%p] %u@%d '

# ── pg_stat_statements (query performance tracking) ─────────────────────────
pg_stat_statements.max = 10000
pg_stat_statements.track = all

# ── Time zone ───────────────────────────────────────────────────────────────
timezone = 'America/Chicago'
log_timezone = 'America/Chicago'

# ── Autovacuum (essential for catalog maintenance) ──────────────────────────
autovacuum = on
autovacuum_max_workers = 4
autovacuum_naptime = 30s
autovacuum_vacuum_scale_factor = 0.1
autovacuum_analyze_scale_factor = 0.05
