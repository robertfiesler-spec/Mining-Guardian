# ============================================================================
# Miner Intelligence Catalog — PostgreSQL 16 in Docker
# ============================================================================
# Host: ROBS-PC (192.168.188.47) — Windows 11 + Docker Desktop + WSL2
# Data dir: D:\miner-intelligence\postgres-data\  (2 TB internal SATA SSD)
# Backup dir: D:\miner-intelligence\backups\
# Logs dir: D:\miner-intelligence\logs\
#
# Network:
#   - Listens on 0.0.0.0:5432 inside the container
#   - Bound to 192.168.188.47:5432 on the host so:
#     * Mining Guardian VPS can reach it via Tailscale subnet route
#     * ROBS-PC itself can connect via localhost or 192.168.188.47
#     * Other facility devices on 192.168.188.0/24 can reach it (e.g.
#       OpenClaw on the Mac when needed)
#   - NOT exposed to the public internet (Cloudflare tunnel deliberately
#     not configured for this service — backend-only)
#
# Postgres tuning is for an AMD Ryzen 7 7800X3D with 32 GB RAM (current).
# Re-tune after RAM upgrade to 64 GB or 128 GB by editing the POSTGRES_*
# environment variables and running `docker compose up -d` to apply.
# ============================================================================

services:
  miner-intel-db:
    image: postgres:16-alpine
    container_name: miner-intel-db
    restart: unless-stopped

    # Bind to the LAN-facing interface so the VPS can reach it via the
    # existing Tailscale subnet route for 192.168.188.0/24. Localhost binding
    # would require an SSH tunnel from the VPS which is more friction.
    ports:
      - "192.168.188.47:5432:5432"

    environment:
      POSTGRES_DB: miner_intelligence
      POSTGRES_USER: miner_intel
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

      # Performance tuning — passed in as command-line args via the
      # postgres-tuning.conf bind mount. Tuned for 32 GB host RAM today.
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"

      # Time zone for log timestamps (Central, matching the facility)
      TZ: America/Chicago

    volumes:
      # Database data — lives on the 2 TB internal SATA SSD
      - type: bind
        source: D:\miner-intelligence\postgres-data
        target: /var/lib/postgresql/data

      # Tuning config — Postgres reads this on startup
      - type: bind
        source: ./postgres-tuning.conf
        target: /etc/postgresql/postgresql.conf
        read_only: true

      # Backup output directory — pg_dump will write here from inside
      # the container, the host can read it from D:\miner-intelligence\backups\
      - type: bind
        source: D:\miner-intelligence\backups
        target: /backups

    # Run Postgres with the custom tuning config
    command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf"]

    # Health check so Docker knows when the DB is ready to accept connections
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U miner_intel -d miner_intelligence"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

    # Resource limits — prevent the DB from eating ALL of ROBS-PC's RAM if
    # someone runs a dumb query. Updated when RAM is upgraded.
    deploy:
      resources:
        limits:
          memory: 16G
        reservations:
          memory: 4G

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

# No external networks — Docker creates a default bridge network for this
# stack and that's all we need. The host port binding handles external access.
